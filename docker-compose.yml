services:

  # ── API Gateway ─────────────────────────────────────────────────────────────
  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      auth-service:
        condition: service_healthy
      check-service:
        condition: service_healthy
      search-service:
        condition: service_healthy
      document-service:
        condition: service_healthy
      data-collector:
        condition: service_healthy
    restart: unless-stopped
    networks: [landscore]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Auth Service ────────────────────────────────────────────────────────────
  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    env_file: .env
    depends_on:
      postgres-auth:
        condition: service_healthy
    restart: unless-stopped
    networks: [landscore]
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import socket; socket.create_connection((\"localhost\", 50051), 2)' 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ── Check Service ───────────────────────────────────────────────────────────
  check-service:
    build:
      context: .
      dockerfile: services/check-service/Dockerfile
    env_file: .env
    depends_on:
      postgres-main:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks: [landscore]
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import socket; socket.create_connection((\"localhost\", 50052), 2)' 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ── Search Service ──────────────────────────────────────────────────────────
  search-service:
    build:
      context: .
      dockerfile: services/search-service/Dockerfile
    env_file: .env
    depends_on:
      postgres-main:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks: [landscore]
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import socket; socket.create_connection((\"localhost\", 50053), 2)' 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ── Document Service ────────────────────────────────────────────────────────
  document-service:
    build:
      context: .
      dockerfile: services/document-service/Dockerfile
    env_file: .env
    depends_on:
      minio:
        condition: service_healthy
    restart: unless-stopped
    networks: [landscore]
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import socket; socket.create_connection((\"localhost\", 50054), 2)' 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── AI Orchestrator ─────────────────────────────────────────────────────────
  ai-orchestrator:
    build:
      context: .
      dockerfile: services/ai-orchestrator/Dockerfile
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks: [landscore]
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import socket; socket.create_connection((\"localhost\", 50055), 2)' 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  ai-orchestrator-worker:
    build:
      context: .
      dockerfile: services/ai-orchestrator/Dockerfile
    command: celery -A app.celery_app worker --loglevel=info --concurrency=4
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks: [landscore]

  # ── Data Collector ──────────────────────────────────────────────────────────
  data-collector:
    build:
      context: .
      dockerfile: services/data-collector/Dockerfile
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks: [landscore]
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import socket; socket.create_connection((\"localhost\", 50056), 2)' 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ── Geo Service ─────────────────────────────────────────────────────────────
  geo-service:
    build:
      context: .
      dockerfile: services/geo-service/Dockerfile
    env_file: .env
    depends_on:
      postgres-geo:
        condition: service_healthy
    restart: unless-stopped
    networks: [landscore]
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import socket; socket.create_connection((\"localhost\", 50057), 2)' 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ── Market Service ──────────────────────────────────────────────────────────
  market-service:
    build:
      context: .
      dockerfile: services/market-service/Dockerfile
    env_file: .env
    depends_on:
      clickhouse:
        condition: service_healthy
    restart: unless-stopped
    networks: [landscore]
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import socket; socket.create_connection((\"localhost\", 50058), 2)' 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ── Infrastructure ───────────────────────────────────────────────────────────

  postgres-auth:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - pg_auth:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks: [landscore]

  postgres-main:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: main_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - pg_main:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks: [landscore]

  postgres-geo:
    image: postgis/postgis:16-3.4-alpine
    environment:
      POSTGRES_DB: geo_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - pg_geo:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks: [landscore]

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks: [landscore]

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [landscore]

  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    environment:
      CLICKHOUSE_DB: market
      CLICKHOUSE_USER: default
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [landscore]

volumes:
  pg_auth:
  pg_main:
  pg_geo:
  redis_data:
  minio_data:
  clickhouse_data:

networks:
  landscore:
    driver: bridge
