syntax = "proto3";
package data_collector;

service DataCollectorService {
  rpc GetPlotByCadastral(CadastralRequest) returns (PlotDataResponse);
  rpc GetPlotByAddress(AddressRequest) returns (PlotDataResponse);
  rpc GetEGRN(EGRNRequest) returns (EGRNResponse);
  rpc SearchPlots(SearchPlotsRequest) returns (SearchPlotsResponse);
  rpc CollectPlotSpatialLayers(SpatialLayersRequest) returns (SpatialLayersResponse);
  rpc CollectPlotDataset(CadastralRequest) returns (PlotDatasetResponse);
}

message CadastralRequest { string cadastral_number = 1; }

message AddressRequest { string address = 1; }

message EGRNRequest {
  string cadastral_number = 1;
  bool use_cache = 2;
}

message PlotDataResponse {
  string cadastral_number = 1;
  string address = 2;
  double area = 3;
  string category = 4;
  string allowed_use = 5;
  string owner_type = 6;
  double lat = 7;
  double lng = 8;
  double price = 9;
  string status = 10;
  string raw_json = 11;
  bool from_cache = 12;
}

message EGRNResponse {
  string cadastral_number = 1;
  string owner = 2;
  repeated string encumbrances = 3;
  string registration_date = 4;
  string raw_json = 5;
  bool from_cache = 6;
}

message SearchPlotsRequest {
  string region = 1;
  string category = 2;
  string allowed_use = 3;
  double area_min = 4;
  double area_max = 5;
  double price_min = 6;
  double price_max = 7;
  int32 limit = 8;
}

message SearchPlotsResponse {
  repeated PlotDataResponse plots = 1;
  int32 total = 2;
}

message SpatialLayersRequest {
  string cadastral_number = 1;
  string parcel_geometry_geojson = 2;
  repeated string source_layer_keys = 3;
  bool include_restrictions = 4;
  bool include_land_use = 5;
  bool include_real_estate_objects = 6;
  bool include_informational_layers = 7;
  bool use_cache = 8;
  string raw_features_by_layer_json = 9; // Local/offline normalized test input; live collection may ignore it.
}

message SpatialLayer {
  string id = 1;
  string source_layer_key = 2;
  string source_layer_name = 3;
  string source_group = 4;
  string payload_kind = 5; // restriction | land_use | real_estate_object | valuation | info
  string normalized_type = 6;
  string label = 7;
  string geometry_geojson = 8;
  string source = 9;
  double confidence = 10;
  repeated string restrictions = 11;
  repeated string normative_basis = 12;
  string properties_json = 13;
}

message SpatialLayersResponse {
  string cadastral_number = 1;
  string parcel_geometry_geojson = 2;
  repeated SpatialLayer restriction_layers = 3;
  repeated SpatialLayer land_use_layers = 4;
  repeated SpatialLayer real_estate_objects = 5;
  repeated SpatialLayer valuation_layers = 6;
  repeated SpatialLayer informational_layers = 7;
  repeated string warnings = 8;
  string raw_json = 9;
  bool from_cache = 10;
  repeated SpatialLayer child_real_estate_objects = 11;
  repeated SpatialLayer land_parts = 12;
  string land_composition_json = 13;
}

message PlotDatasetResponse {
  bool success = 1;
  string cadastral_number = 2;
  string nspd_json = 3;
  string soil_json = 4;
  string infrastructure_json = 5;
  string market_json = 6;
  repeated string warnings = 7;
  string raw_json = 8;
  string source = 9;
}
